<!-- =============================================
     SECTION: Who Should Attend
     ============================================= -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  :root {
    --navy:        #160a3e;
    --navy-mid:    #251260;
    --gold:        #e8a020;
    --gold-pale:   #fffbea;
    --white:       #ffffff;
    --text-dark:   #0f172a;
    --text-mid:    #334155;
    --text-muted:  #64748b;
    --border:      #e2e8f0;
    --section-alt: #f8fafc;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--white); color: var(--text-dark); line-height: 1.6;
  }

  /* ── WHO SHOULD ATTEND ── */
  .who-attend {
    background: var(--section-alt);
    padding: 88px 0;
  }

  .who-inner {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 24px;
    text-align: center;
  }

  .section-tag {
    display: inline-block; font-size: .78rem; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--gold); margin-bottom: .8rem;
  }

  .section-title {
    font-size: clamp(1.7rem, 3.5vw, 2.6rem); font-weight: 800;
    color: var(--text-dark); letter-spacing: -.5px; line-height: 1.2;
    margin-bottom: 2.8rem;
  }

  /* Pills grid */
  .who-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1rem;
  }

  .who-pill {
    display: flex;
    align-items: center;
    gap: .65rem;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 100px;
    padding: .7rem 1.4rem;
    transition: transform .18s, box-shadow .18s, border-color .18s, background .18s;
    cursor: default;
  }

  .who-pill:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(22,10,62,.1);
    border-color: var(--gold);
    background: var(--gold-pale);
  }

  .who-pill-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gold);
    flex-shrink: 0;
  }

  .who-pill span {
    font-size: .92rem;
    font-weight: 600;
    color: var(--navy);
    white-space: nowrap;
  }

  @media (max-width: 600px) {
    .who-attend { padding: 48px 0; }
    .section-title { font-size: 1.4rem; margin-bottom: 2rem; }
    .who-pill { padding: .55rem 1rem; }
    .who-pill span { font-size: .82rem; }
    .who-pill-dot { width: 6px; height: 6px; }
  }
</style>

<!-- WHO SHOULD ATTEND SECTION -->
<section class="who-attend">
  <div class="who-inner">
    <span class="section-tag">Audience</span>
    <h2 class="section-title">Who Should Attend</h2>

    <div class="who-grid">
      <div class="who-pill">
        <div class="who-pill-dot"></div>
        <span>CIOs</span>
      </div>
      <div class="who-pill">
        <div class="who-pill-dot"></div>
        <span>CFOs</span>
      </div>
      <div class="who-pill">
        <div class="who-pill-dot"></div>
        <span>Finance Leaders</span>
      </div>
      <div class="who-pill">
        <div class="who-pill-dot"></div>
        <span>IT Leaders</span>
      </div>
      <div class="who-pill">
        <div class="who-pill-dot"></div>
        <span>Financial Controllers</span>
      </div>
      <div class="who-pill">
        <div class="who-pill-dot"></div>
        <span>Budgeting &amp; Planning Executives</span>
      </div>
      <div class="who-pill">
        <div class="who-pill-dot"></div>
        <span>Consolidation Leaders</span>
      </div>
      <div class="who-pill">
        <div class="who-pill-dot"></div>
        <span>Management Reporting Teams</span>
      </div>
    </div>

  </div>
</section>
