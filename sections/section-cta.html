<!-- =============================================
     SECTION: CTA Banner
     ============================================= -->
<style>
  :root {
    --blue-dark:   #0d2145;
    --blue-mid:    #1a3a6e;
    --orange:      #f97316;
    --orange-light:#fb923c;
    --white:       #ffffff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  .cta-banner {
    background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 50%, #1a3060 100%);
    padding: 72px 6%; text-align: center; position: relative; overflow: hidden;
  }
  .cta-banner::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(249,115,22,.07), transparent);
  }

  .cta-banner h2 {
    font-size: clamp(1.6rem, 3vw, 2.4rem); font-weight: 800;
    color: var(--white); margin-bottom: .8rem; position: relative;
  }

  .cta-banner p {
    color: rgba(255,255,255,.8); max-width: 520px;
    margin: 0 auto 2rem; position: relative;
    font-size: 1rem; line-height: 1.6;
  }

  .cta-actions {
    display: flex; gap: 1rem; justify-content: center;
    flex-wrap: wrap; position: relative;
  }

  .btn-download {
    background: linear-gradient(135deg, var(--orange), #c45a0a);
    color: var(--white); padding: .82rem 1.8rem; border-radius: 8px;
    font-size: .95rem; font-weight: 700; text-decoration: none;
    box-shadow: 0 4px 18px rgba(249,115,22,.4);
    transition: transform .18s, box-shadow .18s;
    display: inline-flex; align-items: center; gap: .5rem;
    font-family: inherit;
  }
  .btn-download:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(249,115,22,.5); }

  .btn-email {
    background: transparent; color: var(--white); padding: .82rem 1.8rem;
    border-radius: 8px; font-size: .95rem; font-weight: 600; text-decoration: none;
    border: 1.5px solid rgba(255,255,255,.4);
    transition: border-color .18s, background .18s;
    display: inline-flex; align-items: center; gap: .5rem;
    font-family: inherit;
  }
  .btn-email:hover { border-color: rgba(255,255,255,.8); background: rgba(255,255,255,.1); }
</style>

<section class="cta-banner">
  <h2>Ready to Transform Your API Management?</h2>
  <p>Download our resources or get in touch with our AI experts today.</p>
  <div class="cta-actions">
    <a href="#" class="btn-download">
      &#8659; Download Whitepaper
    </a>
    <a href="mailto:experts@qnx.ai" class="btn-email">
      &#9993; Contact an Expert
    </a>
  </div>
</section>
